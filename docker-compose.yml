services:
  front:
    build:
      context: ./frontend
      platforms:
        - "linux/amd64"
      args:
        - NODE_ENV=${NODE_ENV}
    env_file:
      - ./frontend/.env.${NODE_ENV}
    ports:
      - "8080:80" # Map port 8080 on the host to port 80 in the container

  back:
    build:
      context: ./backend
      platforms:
        - "linux/amd64"
      args:
        - NODE_ENV=${NODE_ENV}
    env_file:
      - ./backend/.env.${NODE_ENV}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000" # Map port 3000 on the host to port 3000 in the container
