server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;  # Path to your built Vue.js app
        try_files $uri $uri/ /index.html;  # Fallback to index.html for SPA
    }

    location /api {
        proxy_pass http://localhost:3000;  # Redirect /api requests to localhost:3000
        proxy_set_header Host $host;  # Pass the original Host header
        proxy_set_header X-Real-IP $remote_addr;  # Pass the real client IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Pass the forwarded IP
        proxy_set_header X-Forwarded-Proto $scheme;  # Pass the original protocol
    }

    error_page 404 /404.html;  # Optional: Custom error page
}